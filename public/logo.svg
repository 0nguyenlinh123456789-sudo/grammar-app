<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Definition for vintage styles -->
  <defs>
    <style>
      .hand-drawn {
        stroke: #1e293b;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }
    </style>
  </defs>

  <!-- Warm vintage paper background with a hand-sketched double-frame border -->
  <!-- Background matches #fdfbf7 and border matches #1e293b (main app colors!) -->
  <rect x="20" y="20" width="472" height="472" rx="60" fill="#fdfbf7" stroke="#1e293b" stroke-width="12" />
  <rect x="36" y="36" width="440" height="440" rx="46" fill="none" stroke="#1e293b" stroke-width="4" stroke-dasharray="8 8" opacity="0.5" />

  <!-- Multi-layered watercolor wash effect matching the app's palette (Indigo + Yellow) -->
  <!-- Indigo Wash -->
  <path d="M 160,260 Q 200,160 300,190 Q 360,220 320,320 Q 260,380 180,330 Q 120,290 160,260 Z" 
        fill="#818cf8" 
        opacity="0.25" />
  <!-- Yellow/Gold Wash -->
  <path d="M 230,220 Q 320,180 370,250 Q 400,320 310,350 Q 240,360 210,300 Q 180,240 230,220 Z" 
        fill="#fcd34d" 
        opacity="0.35" />
        
  <!-- Hand-drawn Book (Sketchnote style with wobbly ink strokes) -->
  <g class="hand-drawn">
    <!-- Vintage Book Cover (Terracotta Red fill with wobbly stroke) -->
    <path d="M 94,372 C 146,354 206,354 256,369 C 306,354 366,354 418,372 L 418,182 C 366,164 306,164 256,179 C 206,164 146,164 94,182 Z" 
          stroke-width="12" fill="#ef4444" fill-opacity="0.1" />

    <!-- Left Page background (Pure white paper) -->
    <path d="M 256,360 C 210,345 150,345 100,365 C 90,320 90,220 100,175 C 150,155 210,155 256,170 Z" 
          stroke-width="12" fill="#ffffff" />
          
    <!-- Right Page background (Pure white paper) -->
    <path d="M 256,360 C 302,345 362,345 412,365 C 422,320 422,220 412,175 C 362,155 302,155 256,170 Z" 
          stroke-width="12" fill="#ffffff" />

    <!-- Center spine -->
    <path d="M 256,170 L 256,360" stroke-width="12" />
    
    <!-- Stacked pages depth details -->
    <path d="M 100,365 C 150,348 210,348 256,363" stroke-width="6" />
    <path d="M 256,363 C 302,348 362,348 412,365" stroke-width="6" />
    <path d="M 105,372 C 152,355 210,355 256,370 C 302,355 360,355 407,372" stroke-width="4" stroke-dasharray="5 5" opacity="0.8" />

    <!-- Vintage Bookmark Ribbon in the center (Vibrant Gold #facc15 matching app!) -->
    <path d="M 256,210 C 256,260 270,300 285,385 C 275,382 265,382 256,385 L 256,360" 
          stroke-width="8" fill="#facc15" />

    <!-- Hand-sketched lines on left page (text representation - slate grey) -->
    <path d="M 135,215 H 220" stroke-width="6" stroke="#475569" opacity="0.8" />
    <path d="M 135,248 H 205" stroke-width="6" stroke="#475569" opacity="0.8" />
    <path d="M 135,280 H 215" stroke-width="6" stroke="#475569" opacity="0.8" />
    <path d="M 135,312 H 185" stroke-width="6" stroke="#475569" opacity="0.8" />
    
    <!-- Hand-sketched lines on right page -->
    <path d="M 292,215 H 377" stroke-width="6" stroke="#475569" opacity="0.8" />
    <path d="M 292,248 H 365" stroke-width="6" stroke="#475569" opacity="0.8" />
    <path d="M 292,280 H 380" stroke-width="6" stroke="#475569" opacity="0.8" />
    <path d="M 292,312 H 345" stroke-width="6" stroke="#475569" opacity="0.8" />

    <!-- Vintage Sage-Green / Turquoise Feather Quill Pen (#0d9488 - fits emerald theme) -->
    <!-- Feather vanes outline -->
    <path d="M 330,130 C 310,150 280,200 270,250 C 285,230 315,200 340,160 C 365,120 380,85 385,60 C 375,80 350,110 330,130 Z" 
          stroke-width="12" fill="#2dd4bf" fill-opacity="0.9" />
    
    <!-- Feather shaft/spine -->
    <path d="M 385,60 C 350,120 300,180 250,290" stroke-width="8" />

    <!-- Feather fine cuts / details -->
    <path d="M 355,95 C 340,105 330,115 320,125" stroke-width="5" />
    <path d="M 340,120 C 322,132 312,145 300,160" stroke-width="5" />
    <path d="M 322,150 C 302,165 292,180 280,200" stroke-width="5" />
    
    <path d="M 378,80 C 388,95 392,110 395,120" stroke-width="5" />
    <path d="M 365,105 C 375,120 378,135 380,145" stroke-width="5" />

    <!-- Ink drop dripping from quill nib -->
    <path d="M 250,290 C 245,295 240,305 245,312 C 250,317 258,317 262,312 C 267,305 255,295 250,290 Z" 
          fill="#1e293b" stroke-width="2" />

    <!-- Little hand-drawn sparkles / stars around (doodle style) -->
    <!-- Sparkle 1 (Gold/Yellow star #facc15) -->
    <path d="M 120,110 L 120,130 M 110,120 L 130,120" stroke-width="6" stroke="#eab308" />
    <path d="M 113,113 L 127,127 M 113,127 L 127,113" stroke-width="4" stroke="#eab308" />
    
    <!-- Sparkle 2 (Terracotta/Rose #ef4444) -->
    <path d="M 395,110 L 395,126 M 387,118 L 403,118" stroke-width="5" stroke="#ef4444" />
    
    <!-- Sparkle 3 (Indigo #4f46e5) -->
    <path d="M 230,100 L 230,116 M 222,108 L 238,108 M 224,102 L 236,114 M 224,114 L 236,102" stroke-width="4" stroke="#4f46e5" />
  </g>
</svg>
